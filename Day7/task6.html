<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0f;
            --surface: #141417;
            --card: #1a1a1f;
            --border: #2a2a32;
            --accent: #f0e040;
            --accent2: #ff5f40;
            --text: #f0eeea;
            --muted: #6b6b78;
            --done: #2e2e36;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 60px 20px;
            background-image:
                radial-gradient(ellipse 60% 40% at 80% 10%, rgba(240, 224, 64, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse 40% 30% at 10% 80%, rgba(255, 95, 64, 0.05) 0%, transparent 60%);
        }

        .container {
            width: 100%;
            max-width: 560px;
        }

        /* ── Header ── */
        .header {
            margin-bottom: 40px;
        }

        .eyebrow {
            font-family: 'DM Sans', sans-serif;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .eyebrow::before {
            content: '';
            display: inline-block;
            width: 20px;
            height: 2px;
            background: var(--accent);
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(56px, 12vw, 88px);
            line-height: 0.92;
            letter-spacing: 0.01em;
            color: var(--text);
        }

        h1 span {
            color: var(--accent);
        }

        .date-line {
            margin-top: 14px;
            font-size: 13px;
            font-weight: 300;
            color: var(--muted);
            letter-spacing: 0.03em;
        }

        /* ── Input ── */
        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 36px;
            position: relative;
        }

        #taskInput {
            flex: 1;
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 400;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        #taskInput::placeholder {
            color: var(--muted);
            font-style: italic;
            font-weight: 300;
        }

        #taskInput:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(240, 224, 64, 0.1);
        }

        #addBtn {
            background: var(--accent);
            color: #0d0d0f;
            border: none;
            border-radius: 12px;
            padding: 16px 26px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: transform 0.15s, background 0.2s, box-shadow 0.2s;
            white-space: nowrap;
            box-shadow: 0 4px 20px rgba(240, 224, 64, 0.2);
        }

        #addBtn:hover {
            background: #f8ec50;
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(240, 224, 64, 0.35);
        }

        #addBtn:active {
            transform: translateY(0px) scale(0.97);
        }

        /* ── Stats Bar ── */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding: 0 4px;
        }

        .task-count {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .task-count span {
            color: var(--text);
        }

        .progress-wrap {
            width: 100px;
            height: 3px;
            background: var(--border);
            border-radius: 99px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border-radius: 99px;
            transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            width: 0%;
        }

        /* ── Task List ── */
        #taskList {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #taskList li {
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 16px 18px;
            cursor: pointer;
            transition:
                opacity 0.3s ease,
                transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
                border-color 0.2s,
                background 0.2s;
            position: relative;
            overflow: hidden;
            user-select: none;
        }

        #taskList li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent);
            border-radius: 3px 0 0 3px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        #taskList li:hover {
            border-color: rgba(240, 224, 64, 0.3);
            transform: translateX(4px);
        }

        #taskList li:hover::before {
            opacity: 1;
        }

        /* Checkbox circle */
        .check-circle {
            width: 22px;
            height: 22px;
            min-width: 22px;
            border-radius: 50%;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.2s, background 0.2s;
            flex-shrink: 0;
        }

        .check-circle svg {
            opacity: 0;
            transition: opacity 0.2s;
            width: 11px;
            height: 11px;
        }

        #taskList li.completed .check-circle {
            background: var(--accent);
            border-color: var(--accent);
        }

        #taskList li.completed .check-circle svg {
            opacity: 1;
        }

        #taskList li span {
            flex: 1;
            font-size: 15px;
            font-weight: 400;
            line-height: 1.4;
            color: var(--text);
            transition: color 0.2s, text-decoration 0.2s;
        }

        #taskList li.completed {
            background: var(--done);
            border-color: transparent;
        }

        #taskList li.completed::before {
            background: var(--muted);
            opacity: 1;
        }

        #taskList li.completed span {
            color: var(--muted);
            text-decoration: line-through;
        }

        #taskList li.completed:hover {
            transform: translateX(2px);
        }

        /* Delete button */
        .delete-btn {
            background: transparent;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            padding: 4px;
            border-radius: 6px;
            opacity: 0;
            transition: opacity 0.2s, color 0.2s, background 0.2s;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #taskList li:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            color: var(--accent2);
            background: rgba(255, 95, 64, 0.12);
        }

        /* ── Empty State ── */
        .empty-state {
            text-align: center;
            padding: 48px 0;
            display: none;
        }

        .empty-state.visible {
            display: block;
        }

        .empty-icon {
            font-size: 40px;
            margin-bottom: 12px;
            filter: grayscale(0.3);
        }

        .empty-state p {
            font-size: 14px;
            color: var(--muted);
            font-style: italic;
        }

        /* ── Fade-in animation ── */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .slide-in {
            animation: slideIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="eyebrow">Daily Focus</div>
            <h1>My To-Do<br><span>List.</span></h1>
            <p class="date-line" id="dateDisplay"></p>
        </div>

        <div class="input-area">
            <input type="text" id="taskInput" placeholder="What needs to get done?">
            <button id="addBtn">Add</button>
        </div>

        <div class="stats-bar">
            <div class="task-count" id="taskCount">No tasks yet</div>
            <div class="progress-wrap">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <ul id="taskList"></ul>

        <div class="empty-state" id="emptyState">
            <div class="empty-icon">✦</div>
            <p>All clear — add something to get started.</p>
        </div>
    </div>

    <script>
        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const taskList = document.getElementById('taskList');
        const taskCount = document.getElementById('taskCount');
        const progressFill = document.getElementById('progressFill');
        const emptyState = document.getElementById('emptyState');

        // Set date
        const now = new Date();
        document.getElementById('dateDisplay').textContent =
            now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

        addBtn.addEventListener('click', addTask);
        taskInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') addTask();
        });

        function updateStats() {
            const items = taskList.querySelectorAll('li');
            const completed = taskList.querySelectorAll('li.completed');
            const total = items.length;
            const done = completed.length;

            if (total === 0) {
                taskCount.innerHTML = 'No tasks yet';
                progressFill.style.width = '0%';
                emptyState.classList.add('visible');
            } else {
                emptyState.classList.remove('visible');
                taskCount.innerHTML = `<span>${done}</span> of <span>${total}</span> done`;
                progressFill.style.width = total > 0 ? `${(done / total) * 100}%` : '0%';
            }
        }

        function addTask() {
            const taskText = taskInput.value.trim();
            if (!taskText) return;

            const li = document.createElement('li');
            li.classList.add('slide-in');

            // Checkbox circle
            const circle = document.createElement('div');
            circle.className = 'check-circle';
            circle.innerHTML = `<svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M2 6l3 3 5-5" stroke="#0d0d0f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>`;

            const span = document.createElement('span');
            span.textContent = taskText;

            const delBtn = document.createElement('button');
            delBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>`;
            delBtn.className = 'delete-btn';
            delBtn.title = 'Delete task';

            delBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                li.style.transition = 'opacity 0.2s, transform 0.2s';
                li.style.opacity = '0';
                li.style.transform = 'translateX(20px)';
                setTimeout(() => {
                    li.remove();
                    updateStats();
                }, 200);
            });

            li.addEventListener('click', () => {
                li.classList.toggle('completed');
                updateStats();
            });

            li.appendChild(circle);
            li.appendChild(span);
            li.appendChild(delBtn);
            taskList.appendChild(li);

            taskInput.value = '';
            taskInput.focus();
            updateStats();
        }

        updateStats();
    </script>
</body>

</html>
